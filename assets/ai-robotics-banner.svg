<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated AI and robotics profile banner</title>
  <desc id="desc">A dark mission-control style banner with an animated robot arm, neural network nodes, signal pulses, and scanning grid.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.45" stop-color="#101827"/>
      <stop offset="1" stop-color="#071B2A"/>
    </linearGradient>
    <linearGradient id="accent" x1="210" y1="45" x2="1000" y2="315" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.5" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(780 178) rotate(90) scale(170 300)">
      <stop stop-color="#38BDF8" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M 38 0 L 0 0 0 38" fill="none" stroke="#94A3B8" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <style>
      @keyframes pulse {
        0%, 100% { opacity: .32; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.16); }
      }
      @keyframes dash {
        to { stroke-dashoffset: -150; }
      }
      @keyframes scan {
        0% { transform: translateX(-220px); opacity: 0; }
        18%, 70% { opacity: .58; }
        100% { transform: translateX(1220px); opacity: 0; }
      }
      @keyframes servo {
        0%, 100% { transform: rotate(-7deg); }
        50% { transform: rotate(7deg); }
      }
      @keyframes clawTop {
        0%, 100% { transform: rotate(-6deg); }
        50% { transform: rotate(8deg); }
      }
      @keyframes clawBottom {
        0%, 100% { transform: rotate(6deg); }
        50% { transform: rotate(-8deg); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-7px); }
      }
      @keyframes blink {
        0%, 84%, 100% { opacity: .24; }
        92% { opacity: 1; }
      }
      .pulse { animation: pulse 2.6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .pulse.s2 { animation-delay: .45s; }
      .pulse.s3 { animation-delay: .9s; }
      .pulse.s4 { animation-delay: 1.35s; }
      .wire { stroke-dasharray: 8 12; animation: dash 4.8s linear infinite; }
      .scan { animation: scan 5.2s ease-in-out infinite; }
      .arm { animation: servo 4.4s ease-in-out infinite; transform-box: fill-box; transform-origin: 265px 202px; }
      .claw-top { animation: clawTop 2.8s ease-in-out infinite; transform-box: fill-box; transform-origin: 446px 123px; }
      .claw-bottom { animation: clawBottom 2.8s ease-in-out infinite; transform-box: fill-box; transform-origin: 446px 135px; }
      .float { animation: float 5s ease-in-out infinite; }
      .blink { animation: blink 2.2s ease-in-out infinite; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="28" fill="url(#grid)"/>
  <rect width="1200" height="360" rx="28" fill="url(#glow)"/>

  <g class="scan">
    <rect x="0" y="18" width="120" height="324" fill="url(#accent)" opacity="0.16"/>
    <path d="M120 24V336" stroke="#38BDF8" stroke-width="2" opacity="0.65"/>
  </g>

  <g opacity="0.55">
    <path class="wire" d="M650 82 C740 48 795 95 868 76 C936 58 976 88 1044 54" stroke="#38BDF8" stroke-width="2"/>
    <path class="wire" d="M650 276 C726 244 782 299 858 267 C924 239 1006 278 1066 244" stroke="#22C55E" stroke-width="2"/>
    <path class="wire" d="M660 180 C738 136 792 220 870 178 C942 139 1012 192 1088 152" stroke="#F59E0B" stroke-width="2"/>
  </g>

  <g filter="url(#softGlow)">
    <circle class="pulse" cx="690" cy="86" r="8" fill="#38BDF8"/>
    <circle class="pulse s2" cx="782" cy="118" r="8" fill="#22C55E"/>
    <circle class="pulse s3" cx="875" cy="82" r="8" fill="#F59E0B"/>
    <circle class="pulse s4" cx="986" cy="112" r="8" fill="#38BDF8"/>
    <circle class="pulse s2" cx="1060" cy="74" r="8" fill="#22C55E"/>
    <circle class="pulse s3" cx="704" cy="248" r="8" fill="#F59E0B"/>
    <circle class="pulse s4" cx="810" cy="286" r="8" fill="#38BDF8"/>
    <circle class="pulse" cx="918" cy="244" r="8" fill="#22C55E"/>
    <circle class="pulse s2" cx="1036" cy="276" r="8" fill="#F59E0B"/>
  </g>

  <g class="float">
    <rect x="660" y="132" width="204" height="94" rx="18" fill="#0F172A" stroke="#38BDF8" stroke-opacity="0.45"/>
    <circle cx="710" cy="174" r="18" fill="#07111F" stroke="#38BDF8" stroke-width="2"/>
    <circle class="blink" cx="710" cy="174" r="7" fill="#38BDF8"/>
    <circle cx="760" cy="174" r="18" fill="#07111F" stroke="#22C55E" stroke-width="2"/>
    <circle class="blink" cx="760" cy="174" r="7" fill="#22C55E" style="animation-delay:.7s"/>
    <path d="M804 160 H836 M804 178 H842 M804 196 H828" stroke="#F59E0B" stroke-width="4" stroke-linecap="round"/>
    <text x="682" y="214" fill="#CBD5E1" font-size="12" class="mono">AGENT_STATE: ONLINE</text>
  </g>

  <g transform="translate(112 48)">
    <circle cx="112" cy="212" r="46" fill="#111827" stroke="#38BDF8" stroke-opacity="0.45" stroke-width="3"/>
    <circle cx="112" cy="212" r="23" fill="#07111F" stroke="#22C55E" stroke-opacity="0.8" stroke-width="2"/>
    <g class="arm">
      <rect x="112" y="196" width="168" height="34" rx="17" fill="#1F2937" stroke="#38BDF8" stroke-opacity="0.5" stroke-width="2"/>
      <circle cx="278" cy="213" r="28" fill="#111827" stroke="#F59E0B" stroke-width="3"/>
      <rect x="282" y="191" width="118" height="28" rx="14" transform="rotate(-34 282 191)" fill="#1F2937" stroke="#22C55E" stroke-opacity="0.62" stroke-width="2"/>
      <circle cx="392" cy="129" r="22" fill="#111827" stroke="#38BDF8" stroke-width="3"/>
      <path d="M402 129 H434" stroke="#CBD5E1" stroke-width="12" stroke-linecap="round"/>
      <rect x="428" y="116" width="26" height="26" rx="8" fill="#111827" stroke="#F59E0B" stroke-width="3"/>
      <g>
        <g class="claw-top">
          <path d="M446 123 L468 98" stroke="#CBD5E1" stroke-width="8" stroke-linecap="round"/>
          <path d="M468 98 L484 84" stroke="#38BDF8" stroke-width="6" stroke-linecap="round"/>
        </g>
        <g class="claw-bottom">
          <path d="M446 135 L470 158" stroke="#CBD5E1" stroke-width="8" stroke-linecap="round"/>
          <path d="M470 158 L486 168" stroke="#38BDF8" stroke-width="6" stroke-linecap="round"/>
        </g>
      </g>
    </g>
  </g>

  <g>
    <text x="104" y="78" fill="#E5E7EB" font-size="30" font-weight="800" class="sans">Ranbir Kumar</text>
    <text x="104" y="114" fill="#38BDF8" font-size="18" font-weight="700" class="mono">AI/ML • Robotics • Computer Vision • Full-Stack Systems</text>
    <text x="104" y="145" fill="#94A3B8" font-size="16" class="sans">Building practical intelligent systems from data to deployment.</text>
  </g>

  <g class="mono" font-size="12">
    <rect x="910" y="230" width="184" height="70" rx="12" fill="#020617" stroke="#334155"/>
    <text x="930" y="255" fill="#22C55E">mission.loop()</text>
    <text x="930" y="276" fill="#38BDF8">perception → plan</text>
    <text x="930" y="296" fill="#F59E0B">control → learn</text>
  </g>

  <rect x="1" y="1" width="1198" height="358" rx="27" stroke="url(#accent)" stroke-opacity="0.42" stroke-width="2"/>
</svg>
